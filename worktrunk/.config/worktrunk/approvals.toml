[projects."github.com/chariot-giving/chariot"]
approved-commands = [
    "cd {{ worktree_path }} && mise trust --yes",
    "mise run wt:ports {{ branch | sanitize }}",
    "mise run wt:link {{ branch | sanitize }}",
    "cd {{ worktree_path }} && mise axle:build-plugins",
    "cd {{ worktree_path }} && mise go:build-linter",
    "mise run wt:cleanup-ports {{ branch | sanitize }}",
    "cd {{ worktree_path }} && mise docker:down 2>/dev/null || true",
    "cd {{ repo_path }} && mise run docker:prune",
    "trash {{ worktree_path }}",
    "mise run docker:prune {{ branch | sanitize }}",
    "cd {{ worktree_path }} && mise wt:additional-steps",
]
