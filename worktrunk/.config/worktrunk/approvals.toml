[projects."github.com/chariot-giving/chariot"]
approved-commands = [
    "cd {{ worktree_path }} && mise trust --yes",
    "mise run wt:ports {{ branch | sanitize }}",
    "mise run wt:link {{ branch | sanitize }}",
    "cd {{ worktree_path }} && mise axle:build-plugins",
    "cd {{ worktree_path }} && mise go:build-linter",
    "mise run wt:cleanup-ports {{ branch | sanitize }}",
    "cd {{ worktree_path }} && mise docker:down 2>/dev/null || true",
    "cd {{ repo_path }} && mise run docker:prune",
    "trash {{ worktree_path }}",
    "mise run docker:prune {{ branch | sanitize }}",
    "cd {{ worktree_path }} && mise wt:additional-steps",
    "[ -x {{ primary_worktree_path }}/local/custom-hooks/pre-switch ] && {{ primary_worktree_path }}/local/custom-hooks/pre-switch || true",
    "[ -x {{ primary_worktree_path }}/local/custom-hooks/post-create ] && {{ primary_worktree_path }}/local/custom-hooks/post-create || true",
    "[ -x {{ primary_worktree_path }}/local/custom-hooks/post-start ] && {{ primary_worktree_path }}/local/custom-hooks/post-start || true",
    "[ -x {{ primary_worktree_path }}/local/custom-hooks/post-switch ] && {{ primary_worktree_path }}/local/custom-hooks/post-switch || true",
    "[ -x {{ primary_worktree_path }}/local/custom-hooks/pre-commit ] && {{ primary_worktree_path }}/local/custom-hooks/pre-commit || true",
    "[ -x {{ primary_worktree_path }}/local/custom-hooks/pre-merge ] && {{ primary_worktree_path }}/local/custom-hooks/pre-merge || true",
    "[ -x {{ primary_worktree_path }}/local/custom-hooks/post-merge ] && {{ primary_worktree_path }}/local/custom-hooks/post-merge || true",
    "[ -x {{ primary_worktree_path }}/local/custom-hooks/pre-remove ] && {{ primary_worktree_path }}/local/custom-hooks/pre-remove || true",
    "[ -x {{ primary_worktree_path }}/local/custom-hooks/post-remove ] && {{ primary_worktree_path }}/local/custom-hooks/post-remove || true",
    "cd {{ worktree_path }} && mise connect:build-plugins",
    "[ -x {{ primary_worktree_path }}/local/custom-hooks/pre-switch ] && {{ primary_worktree_path }}/local/custom-hooks/pre-switch {{ worktree_path }} || true",
    "[ -x {{ primary_worktree_path }}/local/custom-hooks/post-create ] && {{ primary_worktree_path }}/local/custom-hooks/post-create {{ worktree_path }} || true",
    "[ -x {{ primary_worktree_path }}/local/custom-hooks/post-start ] && {{ primary_worktree_path }}/local/custom-hooks/post-start {{ worktree_path }} || true",
    "[ -x {{ primary_worktree_path }}/local/custom-hooks/post-switch ] && {{ primary_worktree_path }}/local/custom-hooks/post-switch {{ worktree_path }} || true",
    "[ -x {{ primary_worktree_path }}/local/custom-hooks/pre-remove ] && {{ primary_worktree_path }}/local/custom-hooks/pre-remove {{ worktree_path }} || true",
    "[ -x {{ primary_worktree_path }}/local/custom-hooks/post-remove ] && {{ primary_worktree_path }}/local/custom-hooks/post-remove {{ worktree_path }} || true",
]
